name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

env:
  BINARY_PREFIX: sfs
  LD_FLAGS: "-w -s -X smallFileSync/internal/model.AppVersion="

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="$(echo "${GITHUB_REF_NAME}" | sed 's/^v//')"
          OUTPUT="${{ env.BINARY_PREFIX }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -ldflags "${{ env.LD_FLAGS }}${VERSION}" -o "${OUTPUT}.exe" .
          else
            go build -ldflags "${{ env.LD_FLAGS }}${VERSION}" -o "${OUTPUT}" .
          fi

      - name: Create archive
        run: |
          OUTPUT="${{ env.BINARY_PREFIX }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${OUTPUT}.zip" "${OUTPUT}.exe"
          else
            zip "${OUTPUT}.zip" "${OUTPUT}"
          fi

      - name: Generate SHA256 checksum
        run: |
          OUTPUT="${{ env.BINARY_PREFIX }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          sha256sum "${OUTPUT}.zip" | awk '{print $1}' > "${OUTPUT}.zip.sha256"

      - name: Upload archive to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.BINARY_PREFIX }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          asset_name: ${{ env.BINARY_PREFIX }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          tag: ${{ github.ref }}
          overwrite: true

      - name: Upload SHA256 to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.BINARY_PREFIX }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip.sha256
          asset_name: ${{ env.BINARY_PREFIX }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip.sha256
          tag: ${{ github.ref }}
          overwrite: true

  upload-install-script:
    name: Upload install.sh
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload install.sh to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: cmd/install.sh
          asset_name: install.sh
          tag: ${{ github.ref }}
          overwrite: true
